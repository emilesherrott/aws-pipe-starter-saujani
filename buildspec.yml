version: 0.2  # Required - specifies the buildspec file version


env:
  secrets-manager:
    SECRET_USERNAME: "test:username"
    SECRET_PASSWORD: "test:password"
phases:
  pre_build:
    commands:
      - echo Logging in to Docker registry...
      - echo "$SECRET_PASSWORD" | docker login -u "$SECRET_USERNAME" --password-stdin
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t emilesherrott/pottery-db:latest .
  post_build:
    commands:
      - echo "Pushing Docker image..."
      - docker push emilesherrott/pottery-db:latest

artifacts:
  files:
    - Dockerfile
